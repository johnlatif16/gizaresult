<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم الادمن</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
:root{--primary:#3b82f6;--secondary:#10b981;--accent:#8b5cf6;--light:#f8fafc;--dark:#1e293b;}
body{font-family:'Tajawal',sans-serif;display:flex;min-height:100vh;background-color:#f8fafc;}
.sidebar{width:250px;background:linear-gradient(to bottom,var(--primary),#2563eb);color:white;padding:20px;display:flex;flex-direction:column;box-shadow:0 0 15px rgba(0,0,0,0.1);}
.sidebar button{margin-bottom:12px;text-align:right;padding:12px 16px;border-radius:10px;font-weight:bold;cursor:pointer;transition:all 0.3s;background:rgba(255,255,255,0.1);color:white;display:flex;align-items:center;}
.sidebar button:hover{background:rgba(255,255,255,0.2);transform:translateX(-5px);}
.sidebar button i{margin-left:10px;font-size:1.2rem;}
.content{flex-grow:1;padding:25px;overflow-x:auto;background-color:#f1f5f9;}
.hidden{display:none;}
.card{background:white;border-radius:16px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.1);padding:20px;margin-bottom:25px;}
table{width:100%;border-collapse:separate;border-spacing:0;margin:20px 0;border-radius:12px;overflow:hidden;box-shadow:0 4px 6px rgba(0,0,0,0.05);}
th{background:linear-gradient(to right,var(--primary),#2563eb);color:white;padding:14px;font-weight:600;}
td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:center;}
tr:last-child td{border-bottom:none;}
tr:nth-child(even){background-color:#f9fafb;}
.action-btn{padding:8px 14px;border-radius:8px;font-weight:bold;cursor:pointer;transition:all 0.3s;}
.open-btn{background:linear-gradient(to right,#16a34a,#15803d);color:white;}
.open-btn:hover{background:linear-gradient(to right,#15803d,#166534);transform:translateY(-2px);}
.send-btn{background:linear-gradient(to right,#2563eb,#1d4ed8);color:white;}
.send-btn:hover{background:linear-gradient(to right,#1d4ed8,#1e40af);transform:translateY(-2px);}
.delete-btn{background:linear-gradient(to right,#dc2626,#b91c1c);color:white;}
.delete-btn:hover{background:linear-gradient(to right,#b91c1c,#991b1b);transform:translateY(-2px);}
img.screenshot{width:100px;border:1px solid #ddd;border-radius:8px;transition:all 0.3s;}
img.screenshot:hover{transform:scale(1.8);box-shadow:0 5px 15px rgba(0,0,0,0.2);}
input, textarea{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;transition:all 0.3s;background:#f9fafb;}
input:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,0.2);background:white;}
.section-title{font-size:1.8rem;font-weight:700;color:var(--dark);margin-bottom:20px;padding-bottom:10px;border-bottom:3px solid var(--primary);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="text-center mb-8">
    <i class="fas fa-user-shield fa-2x mb-2"></i>
    <h2 class="text-xl font-bold">لوحة التحكم</h2>
  </div>
  
  <button onclick="showSection('requests')"><i class="fas fa-money-bill-wave"></i> الطلبات</button>
  <button onclick="showSection('results')"><i class="fas fa-chart-line"></i> النتائج</button>
  <button onclick="showSection('reservations')"><i class="fas fa-calendar-check"></i> الحجوزات</button>
  <button onclick="showSection('phoneReservations')"><i class="fas fa-phone"></i> الحجوزات (تليفون)</button>
  <button onclick="showSection('send')"><i class="fas fa-envelope"></i> إرسال النتيجة</button>
  
  <div class="mt-auto">
    <button onclick="logout()" class="bg-red-500 hover:bg-red-600"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
  </div>
</div>

<div class="content">

  <!-- باقي الأقسام مثل الطلبات والنتائج والحجوزات -->
  
  <!-- الحجوزات الهاتفية -->
  <div id="phoneReservations" class="hidden">
    <h2 class="section-title">الحجوزات (تليفون)</h2>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>الرقم القومي</th>
            <th>رقم الهاتف</th>
            <th>رقم المحول</th>
            <th>صورة التحويل</th>
            <th>تاريخ الحجز</th>
          </tr>
        </thead>
        <tbody id="phoneReservationsTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
function showSection(id){
  ['requests','results','reservations','send','phoneReservations'].forEach(sec => document.getElementById(sec).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function logout(){ window.location.href = '/login.html'; }

// تحميل الحجوزات الهاتفية
async function loadPhoneReservations() {
  const res = await fetch('/api/phone-reservations');
  const data = await res.json();
  const tbody = document.getElementById('phoneReservationsTable');
  tbody.innerHTML = '';
  data.reservations.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.nationalId}</td>
      <td>${r.phone}</td>
      <td>${r.senderPhone || 'غير متوفر'}</td>
      <td>${r.screenshot ? `<img class="screenshot" src="/uploads/${r.screenshot}" />` : 'لا يوجد'}</td>
      <td>${r.reserved_at ? new Date(r.reserved_at).toLocaleString() : ''}</td>
    `;
    tbody.appendChild(tr);
  });
}

// استدعاء التحميل عند فتح القسم
setInterval(loadPhoneReservations, 10000);
loadPhoneReservations();
</script>

</body>
</html>
